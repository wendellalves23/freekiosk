apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"


def keystorePropertiesFile = rootProject.file("gradle.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

/**
 * This is the configuration block to customize your React Native Android app.
 * By default you don't need to apply any configuration, just uncomment the lines you need.
 */
react {
    /* Folders */
    //   The root of your project, i.e. where "package.json" lives. Default is '../..'
    // root = file("../../")
    //   The folder where the react-native NPM package is. Default is ../../node_modules/react-native
    // reactNativeDir = file("../../node_modules/react-native")
    //   The folder where the react-native Codegen package is. Default is ../../node_modules/@react-native/codegen
    // codegenDir = file("../../node_modules/@react-native/codegen")
    //   The cli.js file which is the React Native CLI entrypoint. Default is ../../node_modules/react-native/cli.js
    // cliFile = file("../../node_modules/react-native/cli.js")

    /* Variants */
    //   The list of variants to that are debuggable. For those we're going to
    //   skip the bundling of the JS bundle and the assets. By default is just 'debug'.
    //   If you add flavors like lite, prod, etc. you'll have to list your debuggableVariants.
    // debuggableVariants = ["liteDebug", "prodDebug"]

    /* Bundling */
    //   A list containing the node command and its flags. Default is just 'node'.
    // nodeExecutableAndArgs = ["node"]
    //
    //   The command to run when bundling. By default is 'bundle'
    // bundleCommand = "ram-bundle"
    //
    //   The path to the CLI configuration file. Default is empty.
    // bundleConfig = file(../rn-cli.config.js)
    //
    //   The name of the generated asset file containing your JS bundle
    // bundleAssetName = "MyApplication.android.bundle"
    //
    //   The entry file for bundle generation. Default is 'index.android.js' or 'index.js'
    // entryFile = file("../js/MyApplication.android.js")
    //
    //   A list of extra flags to pass to the 'bundle' commands.
    //   See [https://github.com/react-native-community/cli/blob/main/docs/commands.md#bundle](https://github.com/react-native-community/cli/blob/main/docs/commands.md#bundle)
    // extraPackagerArgs = []

    /* Hermes Commands */
    //   The hermes compiler command to run. By default it is 'hermesc'
    // hermesCommand = "$rootDir/my-custom-hermesc/bin/hermesc"
    //
    //   The list of flags to pass to the Hermes compiler. By default is "-O", "-output-source-map"
    // hermesFlags = ["-O", "-output-source-map"]

    /* Autolinking */
    autolinkLibrariesWithApp()
}

/**
 * Set this to true to Run Proguard on Release builds to minify the Java bytecode.
 */
def enableProguardInReleaseBuilds = true

/**
 * Play Store compliance: disable in-app self-update when building with -Pplaystore.
 * Usage:
 *   APK  (self-update ON):  ./gradlew assembleRelease
 *   AAB  (self-update OFF): ./gradlew bundleRelease -Pplaystore
 */
def enableSelfUpdate = !project.hasProperty('playstore')

/**
 * OTA manifest URLs (Cloudflare R2 public bucket).
 * Override in gradle.properties:
 *   FREEKIOSK_UPDATE_MANIFEST_URL=https://downloads.example.com/releases/freekiosk/latest.json
 *   FREEKIOSK_UPDATE_MANIFEST_URL_BETA=https://downloads.example.com/releases/freekiosk/latest-beta.json
 */
def updateManifestUrl = project.findProperty('FREEKIOSK_UPDATE_MANIFEST_URL')
        ?: 'https://downloads.filare.a23.net.br/releases/freekiosk/latest.json'
def updateManifestUrlBeta = project.findProperty('FREEKIOSK_UPDATE_MANIFEST_URL_BETA')
        ?: 'https://downloads.filare.a23.net.br/releases/freekiosk/latest-beta.json'

/**
 * The preferred build flavor of JavaScriptCore (JSC)
 *
 * For example, to use the international variant, you can use:
 * `def jscFlavor = io.github.react-native-community:jsc-android-intl:2026004.+`
 *
 * The international variant includes ICU i18n library and necessary data
 * allowing to use e.g. `Date.toLocaleString` and `String.localeCompare` that
 * give correct results when using with locales other than en-US. Note that
 * this variant is about 6MiB larger per architecture than default.
 */
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'
def hermesEnabled = true

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.freekiosk"
    defaultConfig {
        applicationId "com.freekiosk"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 44
        versionName "1.2.23"

        // Expose self-update flag to both Kotlin (BuildConfig) and JS (via UpdateModule constants)
        buildConfigField "boolean", "ENABLE_SELF_UPDATE", "${enableSelfUpdate}"
        buildConfigField "String", "UPDATE_MANIFEST_URL", "\"${updateManifestUrl}\""
        buildConfigField "String", "UPDATE_MANIFEST_URL_BETA", "\"${updateManifestUrlBeta}\""

        // Play Store compliance: when -Pplaystore is set, replace REQUEST_INSTALL_PACKAGES
        // with INTERNET (already declared → deduplicated by manifest merger → effectively removed)
        // and disable UpdateInstallReceiver.
        if (enableSelfUpdate) {
            manifestPlaceholders = [
                usesCleartextTraffic: "true",
                updateReceiverEnabled: "true",
                accessibilityServiceEnabled: "true"
            ]
        } else {
            manifestPlaceholders = [
                usesCleartextTraffic: "true",
                updateReceiverEnabled: "false",
                accessibilityServiceEnabled: "false"
            ]
        }
    }
    
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            if (keystorePropertiesFile.exists() && 
                keystoreProperties['FREEKIOSK_UPLOAD_STORE_FILE'] != null) {
                storeFile file(keystoreProperties['FREEKIOSK_UPLOAD_STORE_FILE'])
                storePassword keystoreProperties['FREEKIOSK_UPLOAD_STORE_PASSWORD']
                keyAlias keystoreProperties['FREEKIOSK_UPLOAD_KEY_ALIAS']
                keyPassword keystoreProperties['FREEKIOSK_UPLOAD_KEY_PASSWORD']
            } else {
                // Use debug keystore as fallback
                storeFile file('debug.keystore')
                storePassword 'android'
                keyAlias 'androiddebugkey'
                keyPassword 'android'
            }
        }
    }
    
    // Exclude duplicate META-INF files from HiveMQ MQTT client's Netty dependencies
    packaging {
        resources {
            excludes += ['META-INF/INDEX.LIST', 'META-INF/io.netty.versions.properties']
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled enableProguardInReleaseBuilds
            shrinkResources true
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }

    // Play Store builds: merge an overlay manifest that uses tools:node="remove"
    // to completely strip FreeKioskAccessibilityService (and its BIND_ACCESSIBILITY_SERVICE
    // permission) from the final merged manifest — not just disable it.
    if (project.hasProperty('playstore')) {
        sourceSets {
            release {
                manifest.srcFile 'src/playstore/AndroidManifest.xml'
            }
        }
    }
}

// Fix autolinking bug where react-native-screens incorrectly registers RNSSafeAreaViewComponentDescriptor
task fixAutolinkingBug {
    doLast {
        def autolinkingFile = file("build/generated/autolinking/src/main/jni/autolinking.cpp")
        if (autolinkingFile.exists()) {
            def content = autolinkingFile.text
            def fixed = content.replace('RNSSafeAreaViewComponentDescriptor', 'RNCSafeAreaViewComponentDescriptor')
            if (content != fixed) {
                autolinkingFile.text = fixed
                println "[FreeKiosk] Fixed autolinking bug: RNSSafeAreaViewComponentDescriptor -> RNCSafeAreaViewComponentDescriptor"
            }
        }
    }
}

// Run fix before any CMake build task
tasks.whenTaskAdded { task ->
    if (task.name.startsWith('buildCMake')) {
        task.dependsOn fixAutolinkingBug
    }
}

// React Native Vector Icons configuration
apply from: file("../../node_modules/react-native-vector-icons/fonts.gradle")

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")

    // NanoHTTPD for REST API server
    implementation("org.nanohttpd:nanohttpd:2.3.1")

    // HiveMQ MQTT Client for Home Assistant integration
    implementation("com.hivemq:hivemq-mqtt-client:1.3.12")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}